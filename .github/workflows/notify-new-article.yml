name: Daily article digest

on:
  schedule:
    # 07:00 Asia/Taipei. GitHub cron uses UTC.
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: 'How many hours of newly published pages to include'
        required: false
        default: '24'
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Send daily digest
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ vars.RESEND_FROM }}
          RESEND_TO: mnhsu@pm.me
          SITE_ORIGIN: https://www.mnhsu.xyz
          LOOKBACK_HOURS: ${{ inputs.lookback_hours || '24' }}
        run: node scripts/notify-new-article.mjs
